name: Production Site Audit

on:
  schedule:
    - cron: "17 13 * * *"
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out site
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run strict production indexability audit
        run: npm run audit -- --url=https://www.irmaacheck.com/

      - name: Run production smoke checks
        run: npm run smoke -- --url=https://www.irmaacheck.com/
